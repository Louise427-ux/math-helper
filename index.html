<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>数学读题小助手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --success-bg: #dcfce7;
      --error: #dc2626;
      --error-bg: #fee2e2;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 17px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 32px;
    }

    /* ========== 首页 ========== */
    .home-header {
      text-align: center;
      padding: 24px 0 16px;
    }

    .home-header h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .home-desc {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      padding: 0 8px;
      margin-bottom: 20px;
    }

    .preview-banner {
      background: #eff6ff;
      color: var(--primary);
      border: 1px solid #bfdbfe;
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.6;
      text-align: left;
    }

    .student-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      text-align: left;
    }

    .student-card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .student-fields {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    .student-input {
      width: 100%;
      padding: 11px 12px;
      font-size: 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      outline: none;
    }

    .student-input:focus { border-color: var(--primary); }

    .student-current {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .student-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .student-actions .btn {
      padding: 11px 14px;
      font-size: 15px;
    }

    .all-done-banner {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #fff;
      text-align: center;
      padding: 16px;
      border-radius: var(--radius);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .question-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-block;
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 20px;
      background: #eff6ff;
      color: var(--primary);
    }

    .tag.level-basic { background: #f0fdf4; color: #16a34a; }
    .tag.level-medium { background: #fff7ed; color: #ea580c; }
    .tag.level-hard { background: #fef2f2; color: #dc2626; }

    .status {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .status.done { color: var(--success); font-weight: 600; }

    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      font-size: 17px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: #f1f5f9;
      color: var(--text);
      margin-top: 10px;
    }

    .btn-next {
      margin-top: 16px;
      background: var(--success);
      color: #fff;
    }

    .btn-next:hover { background: #15803d; }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ========== 练习页 ========== */
    .practice-header {
      margin-bottom: 16px;
    }

    .practice-header h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .progress-bar {
      font-size: 15px;
      color: var(--primary);
      font-weight: 600;
    }

    .problem-image-wrap {
      margin-bottom: 16px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: #fff;
      box-shadow: var(--shadow);
    }

    .problem-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .problem-box {
      background: #fffbeb;
      border: 2px solid #fde68a;
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
      font-size: 18px;
      line-height: 1.8;
      font-weight: 500;
    }

    .step-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .step-question {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 16px;
      line-height: 1.7;
    }

    .history-section {
      margin-bottom: 16px;
    }

    .history-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .history-step {
      background: var(--success-bg);
      border: 1px solid #86efac;
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .history-step-num {
      font-size: 13px;
      font-weight: 600;
      color: var(--success);
      margin-bottom: 4px;
    }

    .completed-steps-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
    }

    .completed-steps-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .completed-steps-mobile {
      display: none;
    }

    .completed-steps-summary {
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      list-style-position: inside;
    }

    .completed-step {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .completed-step:last-child {
      margin-bottom: 0;
    }

    .completed-step-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--success);
      margin-bottom: 6px;
    }

    .completed-step-question,
    .completed-step-answer {
      font-size: 14px;
      line-height: 1.6;
    }

    .completed-step-question {
      color: var(--text);
      margin-bottom: 6px;
    }

    .completed-step-answer {
      color: #166534;
    }

    .completed-step-label {
      font-weight: 700;
    }

    .knowledge-card {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .knowledge-card-header {
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .knowledge-card-toggle {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .knowledge-card-body {
      display: none;
      padding: 0 12px 12px;
    }

    .knowledge-card.is-open .knowledge-card-body {
      display: block;
    }

    .knowledge-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .knowledge-tag {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: var(--primary);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .knowledge-tag.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .knowledge-explanation {
      min-height: 32px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .current-step-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .options-list { list-style: none; }

    .option-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      margin-bottom: 10px;
      font-size: 16px;
      background: #f8fafc;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      line-height: 1.5;
      transition: border-color 0.15s, background 0.15s;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .option-btn:disabled { cursor: default; }

    .option-btn.selected-wrong {
      border-color: var(--error);
      background: var(--error-bg);
    }

    .option-btn.selected-correct {
      border-color: var(--success);
      background: var(--success-bg);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      font-size: 17px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      outline: none;
    }

    .input-field:focus { border-color: var(--primary); }

    .feedback {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: var(--radius);
      font-size: 16px;
      line-height: 1.6;
      display: none;
    }

    .feedback.show { display: block; }

    .feedback.correct {
      background: var(--success-bg);
      color: #166534;
      border: 1px solid #86efac;
    }

    .feedback.wrong {
      background: var(--error-bg);
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .feedback-title {
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 6px;
    }

    /* ========== 反馈卡片 ========== */
    .feedback-card-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .feedback-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .feedback-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--error-bg);
    }

    .feedback-card-icon {
      font-size: 32px;
    }

    .feedback-card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--error);
    }

    .feedback-card-content {
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 20px;
      padding: 14px;
      background: var(--error-bg);
      border-radius: 8px;
      border-left: 4px solid var(--error);
    }

    .feedback-card-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .feedback-card-btn:active {
      background: var(--primary-dark);
    }

    /* ========== 微变式页 ========== */
    .remedial-header {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .remedial-badge {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .remedial-skill {
      font-size: 14px;
      opacity: 0.85;
    }

    .btn-finish {
      margin-top: 16px;
      background: #7c3aed;
      color: #fff;
    }

    .btn-finish:hover { background: #6d28d9; }

    /* ========== 完成页 ========== */
    .complete-page {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      box-shadow: var(--shadow);
      border: 2px solid #86efac;
    }

    .complete-emoji {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .complete-page h2 {
      font-size: 24px;
      color: var(--success);
      margin-bottom: 20px;
    }

    .complete-info {
      text-align: left;
      background: #f0fdf4;
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 20px;
      font-size: 16px;
      line-height: 2;
    }

    .complete-info strong { color: var(--text); }

    .complete-hint {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.7;
    }

    /* ========== 做题页分栏布局 ========== */
    .practice-layout {
      display: block;
    }

    .question-toggle {
      margin-bottom: 14px;
      background: #eff6ff;
      color: var(--primary);
      border: 1px solid #bfdbfe;
      font-size: 15px;
      padding: 12px 16px;
    }

    .question-toggle::before { content: "📖 "; }

    .panel-progress {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .panel-progress .done-count { color: var(--success); }

    /* 手机端：题图默认可见，题干文字可折叠，减少看图和作答之间的跳转 */
    @media (max-width: 767px) {
      .completed-steps-section {
        padding: 0;
        margin-bottom: 10px;
        overflow: hidden;
      }

      .completed-steps-desktop {
        display: none;
      }

      .completed-steps-mobile {
        display: block;
      }

      .completed-steps-summary {
        padding: 11px 14px;
        font-size: 14px;
      }

      .completed-steps-mobile[open] .completed-steps-summary {
        border-bottom: 1px solid var(--border);
      }

      .completed-steps-mobile-body {
        padding: 10px;
      }

      .completed-step {
        padding: 9px 10px;
        margin-bottom: 8px;
      }

      .completed-step-num {
        margin-bottom: 4px;
      }

      .completed-step-question,
      .completed-step-answer {
        font-size: 13px;
        line-height: 1.5;
      }

      .question-toggle {
        margin-bottom: 10px;
        padding: 10px 14px;
      }

      .question-panel-body { display: block; }

      .question-panel .practice-header {
        margin-bottom: 10px;
      }

      .question-panel .practice-header h2 {
        font-size: 18px;
        margin-bottom: 4px;
      }

      .question-panel .problem-box {
        display: none;
        margin-bottom: 12px;
        padding: 12px;
        font-size: 16px;
        line-height: 1.65;
      }

      .question-panel.is-open .problem-box { display: block; }

      .question-panel .problem-image-wrap {
        margin-bottom: 10px;
        max-height: 220px;
      }

      .question-panel .problem-image {
        height: clamp(160px, 42vw, 220px);
        object-fit: contain;
      }

      .question-panel .history-section {
        max-height: 118px;
        overflow-y: auto;
        margin-bottom: 12px;
      }

      .question-panel .history-title {
        margin-bottom: 6px;
      }

      .question-panel .history-step {
        padding: 8px 10px;
        margin-bottom: 6px;
      }

      .question-panel .history-step-num {
        margin-bottom: 0;
      }
    }

    /* 平板端：进入左右分栏，但比桌面端更紧凑 */
    @media (min-width: 768px) and (max-width: 899px) {
      .app.app--practice { max-width: 1024px; }

      .practice-layout {
        display: grid;
        grid-template-columns: minmax(300px, 44%) minmax(0, 1fr);
        gap: 20px;
        align-items: start;
      }

      .question-panel {
        position: sticky;
        top: 16px;
        align-self: start;
        max-height: calc(100vh - 32px);
        overflow-y: auto;
      }

      .question-toggle { display: none !important; }
      .question-panel-body { display: block !important; }
    }

    /* 电脑端（宽屏）：左右分栏，左侧原题区固定，题图随屏幕自适应放大 */
    @media (min-width: 900px) {
      .app.app--practice { max-width: 1200px; }

      .practice-layout {
        display: grid;
        /* 左侧原题区按容器宽度自适应（最小 360px，最多约 48%），屏幕越大题图越大 */
        grid-template-columns: minmax(360px, 48%) minmax(0, 1fr);
        gap: 24px;
        align-items: start;
      }

      .question-panel {
        position: sticky;
        top: 20px;
        align-self: start;
        max-height: calc(100vh - 40px);
        overflow-y: auto;
      }

      .question-toggle { display: none !important; }
      .question-panel-body { display: block !important; }
    }

    /* 超宽屏：进一步放大原题区与题图 */
    @media (min-width: 1400px) {
      .app.app--practice { max-width: 1440px; }

      .practice-layout {
        grid-template-columns: minmax(420px, 52%) minmax(0, 1fr);
      }
    }

    .problem-image { cursor: zoom-in; }

    /* ========== 图片放大预览 ========== */
    .image-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .image-modal.show { display: flex; }

    .image-modal-img {
      max-width: 95vw;
      max-height: 90vh;
      width: auto;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      cursor: default;
    }

    .image-modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      width: 44px;
      height: 44px;
      font-size: 28px;
      line-height: 1;
      color: #fff;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    .image-modal-close:hover { background: rgba(255, 255, 255, 0.3); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- 内容由 JS 渲染 -->
  </div>

  <!-- 图片放大预览层 -->
  <div class="image-modal" id="imageModal">
    <button type="button" class="image-modal-close" id="imageModalClose" aria-label="关闭">×</button>
    <img class="image-modal-img" id="imageModalImg" src="" alt="放大题图">
  </div>

  <script src="questions.js"></script>
  <script>
    const STORAGE_KEY = 'math_reading_completed';
    const STUDENT_KEY = 'math_reading_student';
    const EVENT_LOG_KEY = 'math_reading_event_logs';
    const PENDING_EVENT_LOG_KEY = 'math_reading_pending_event_logs';
    const API_BASE_URL = 'http://localhost:3000';
    const DEFAULT_KNOWLEDGE_EXPLANATION = '这个知识点用于帮助你完成本题中的关键转化。';

    const knowledgeBase = {
      '折叠对应线段识别': '折叠前后的对应点决定对应线段，折痕上的点保持不动。',
      '折叠对应角识别': '折叠前后重合的角相等，要根据对应边来判断对应角。',
      '角关系转化': '把图中较大的角拆成已知小角，或用平角关系表示未知角。',
      '列方程求角': '把角度之间的数量关系写成等式，再求出未知角。',
      '平行线角关系迁移': '利用平行线把一个位置的角关系迁移到另一个位置。',

      '垂直平分线与中点关系': '垂直平分线通常和中点、等距关系一起使用。',
      '垂直平分线性质': '垂直平分线上的点到线段两个端点的距离相等。',
      '周长关系转化': '把周长拆成若干线段长度，再利用相等线段进行替换。',

      '平角关系与方程求角': '先用平角建立等式，再结合已知角关系求未知角。'
    };

    // ---------- 路由状态 ----------
    let currentView = 'home'; // home | practice | remedial | complete
    let currentQuestionId = null;
    let currentStepIndex = 0;
    let stepAnswered = false;
    let stepHistory = []; // 已完成步骤：{ stepNum, question, answer }
    let stepErrorCount = 0; // 当前步骤的错误次数（用于分级提示）
    let showingFeedbackCard = false; // 是否正在显示反馈卡片

    // 微变式相关状态
    let stepErrors = [];          // 主线各步的错误记录
    let currentRemedialData = null; // 当前推送的微变式数据
    let remedialAnswered = false;   // 微变式是否已答对

    const app = document.getElementById('app');

    // ---------- localStorage ----------
    function getCompletedIds() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function markCompleted(id) {
      const ids = getCompletedIds();
      if (!ids.includes(id)) {
        ids.push(id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
      }
    }

    function isCompleted(id) {
      return getCompletedIds().includes(id);
    }

    function getCurrentStudent() {
      const raw = localStorage.getItem(STUDENT_KEY);
      if (!raw) return null;

      try {
        const data = JSON.parse(raw);
        if (!data.className || !data.studentName) return null;

        return {
          className: data.className,
          studentName: data.studentName
        };
      } catch (error) {
        return null;
      }
    }

    function setCurrentStudent(className, studentName) {
      localStorage.setItem(STUDENT_KEY, JSON.stringify({
        className,
        studentName
      }));
    }

    function clearCurrentStudent() {
      localStorage.removeItem(STUDENT_KEY);
    }

    function isPreviewMode() {
      return new URLSearchParams(window.location.search).get('preview') === '1';
    }

    // ---------- 事件记录（本地，最小实现） ----------
    function getEventLogs() {
      try {
        const raw = localStorage.getItem(EVENT_LOG_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveEventLogs(logs) {
      try {
        localStorage.setItem(EVENT_LOG_KEY, JSON.stringify(Array.isArray(logs) ? logs : []));
      } catch {
        // localStorage 写入失败时静默忽略，不影响答题
      }
    }

    function clearEventLogs() {
      localStorage.removeItem(EVENT_LOG_KEY);
    }

    function getPendingEventLogs() {
      try {
        const raw = localStorage.getItem(PENDING_EVENT_LOG_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function savePendingEventLogs(pendingLogs) {
      try {
        localStorage.setItem(PENDING_EVENT_LOG_KEY, JSON.stringify(Array.isArray(pendingLogs) ? pendingLogs : []));
        return true;
      } catch {
        console.warn('[savePendingEventLogs failed]');
        return false;
      }
    }

    function queuePendingEvent(event) {
      if (!event || !event.clientEventId || event.isPreview === true) return;

      const pendingLogs = getPendingEventLogs();
      const exists = pendingLogs.some(item => item && item.clientEventId === event.clientEventId);
      if (!exists) {
        pendingLogs.push(event);
        if (savePendingEventLogs(pendingLogs)) {
          console.log('[queuePendingEvent]', { clientEventId: event.clientEventId, pendingCount: pendingLogs.length });
        }
      }
    }

    function generateClientEventId() {
      if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        return window.crypto.randomUUID();
      }
      return `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    }

    function flushPendingEvents() {
      if (isPreviewMode()) return;

      const pendingLogs = getPendingEventLogs();
      if (pendingLogs.length === 0) return;

      fetch(`${API_BASE_URL}/api/events/batch`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ events: pendingLogs })
      })
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          return response.json();
        })
        .then(result => {
          if (result && result.ok) {
            savePendingEventLogs([]);
            console.log('[flushPendingEvents]', result);
          } else {
            console.warn('[flushPendingEvents failed]', result);
          }
        })
        .catch(error => {
          console.warn('[flushPendingEvents failed]', error);
        });
    }

    function uploadEvent(event) {
      fetch(`${API_BASE_URL}/api/events`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(event)
      })
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          return response.json();
        })
        .then(result => {
          console.log('[uploadEvent]', result);
          flushPendingEvents();
        })
        .catch(error => {
          queuePendingEvent(event);
          console.warn('[uploadEvent failed]', error);
        });
    }

    function logEvent(eventType, payload = {}) {
      const student = getCurrentStudent();
      const preview = isPreviewMode();

      let currentStep = null;
      if (currentQuestionId != null) {
        const q = questionsData.find(x => x.id === currentQuestionId);
        if (q && Array.isArray(q.steps)) {
          currentStep = q.steps[currentStepIndex] || null;
        }
      }

      const event = {
        eventType: eventType,
        createdAt: new Date().toISOString(),
        className: student ? student.className : null,
        studentName: student ? student.studentName : null,
        questionId: currentQuestionId != null ? currentQuestionId : null,
        stepIndex: currentQuestionId != null ? currentStepIndex : null,
        stepNum: currentQuestionId != null ? currentStepIndex + 1 : null,
        skillTag: currentStep && currentStep.skillTag ? currentStep.skillTag : null,
        priority: currentStep && typeof currentStep.priority === 'number' ? currentStep.priority : null,
        isPreview: preview,
        ...payload,
        clientEventId: payload.clientEventId || generateClientEventId()
      };

      if (preview) {
        // 教师预览模式：只打印，不写入 localStorage，避免混入学生数据
        console.log('[logEvent][preview]', event);
        return event;
      }

      const logs = getEventLogs();
      logs.push(event);
      saveEventLogs(logs);
      console.log('[logEvent]', event);
      uploadEvent(event);
      return event;
    }

    function exportEventLogsCsv() {
      const logs = getEventLogs().filter(item => item && item.isPreview === false);
      if (logs.length === 0) {
        alert('暂无可导出的学生作答记录');
        return;
      }

      const columns = [
        'createdAt',
        'eventType',
        'className',
        'studentName',
        'questionId',
        'questionTitle',
        'stepIndex',
        'stepNum',
        'skillTag',
        'priority',
        'answerType',
        'selectedIndex',
        'selectedAnswer',
        'answer',
        'answerOrSelection',
        'errorCount',
        'remedialQuestion',
        'sourceStepIndex',
        'sourceStepNum',
        'sourceSkillTag',
        'sourcePriority',
        'hasRemedial',
        'completedAt'
      ];

      const toCsvValue = value => {
        if (value == null) return '';
        const str = String(value);
        return /[",\r\n]/.test(str) ? `"${str.replace(/"/g, '""')}"` : str;
      };

      const rows = logs.map(log => {
        const answerOrSelection = log.selectedAnswer != null && log.selectedAnswer !== ''
          ? log.selectedAnswer
          : (log.answer != null ? log.answer : '');
        return columns.map(column => {
          const value = column === 'answerOrSelection' ? answerOrSelection : log[column];
          return toCsvValue(value);
        }).join(',');
      });

      const now = new Date();
      const date = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
      const csv = '\uFEFF' + [columns.join(','), ...rows].join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `math-reading-event-logs-${date}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function exportTeacherFriendlyCsv() {
      const logs = getEventLogs().filter(item => item && item.isPreview === false);
      if (logs.length === 0) {
        alert('暂无可导出的学生作答记录');
        return;
      }

      const columns = [
        '时间',
        '班级',
        '姓名',
        '题目ID',
        '题目名称',
        '步骤序号',
        '事件类型',
        '是否答对',
        '学生作答',
        '错误次数',
        '错因标签',
        '是否进入补练',
        '补练题目',
        '来源步骤',
        '是否完成整题'
      ];

      const eventTypeMap = {
        step_correct: '主线答对',
        step_wrong: '主线答错',
        remedial_start: '进入补练',
        remedial_correct: '补练答对',
        remedial_wrong: '补练答错',
        question_complete: '完成整题'
      };

      const toCsvValue = value => {
        if (value == null) return '';
        const str = String(value);
        return /[",\r\n]/.test(str) ? `"${str.replace(/"/g, '""')}"` : str;
      };

      const getQuestionTitle = log => {
        if (log.questionTitle) return log.questionTitle;
        const q = questionsData.find(item => item.id === log.questionId);
        return q ? q.title : '';
      };

      const rows = logs.map(log => {
        const answer = log.selectedAnswer != null && log.selectedAnswer !== ''
          ? log.selectedAnswer
          : (log.answer != null ? log.answer : '');
        const correct = log.eventType === 'step_correct' || log.eventType === 'remedial_correct'
          ? '是'
          : (log.eventType === 'step_wrong' || log.eventType === 'remedial_wrong' ? '否' : '');
        const enteredRemedial = log.eventType === 'remedial_start'
          ? '是'
          : (log.eventType === 'question_complete' ? (log.hasRemedial ? '是' : '否') : '');
        const completed = log.eventType === 'question_complete' ? '是' : '';
        const sourceStep = log.sourceStepNum != null ? log.sourceStepNum : log.stepNum;

        return [

          log.className,
          log.studentName,

          answer,
          log.errorCount,

          enteredRemedial,

          completed

      const now = new Date();
      const date = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
      const csv = '\uFEFF' + [columns.join(','), ...rows].join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `数学读题作答记录-${date}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    // ---------- 答案标准化 ----------
    function normalizeAnswer(str) {
      if (typeof str !== 'string') return '';
      let s = str.trim();
      // 去掉所有空格（含全角）
      s = s.replace(/[\s\u3000]/g, '');
      // 中文符号转英文
      const map = {
        '＋': '+', '－': '-', '×': '*', '÷': '/',
        '＝': '=', '（': '(', '）': ')',
        '°': '°', '度': '度',
        'ｘ': 'x', 'Ｘ': 'x', 'χ': 'x'
      };
      for (const [cn, en] of Object.entries(map)) {
        s = s.split(cn).join(en);
      }
      return s.toLowerCase();
    }

    function checkInputAnswer(input, acceptedAnswers) {
      const normalized = normalizeAnswer(input);
      return acceptedAnswers.some(a => normalizeAnswer(a) === normalized);
    }

    // ---------- 难度样式 ----------
    function levelClass(level) {
      if (level === '基础') return 'level-basic';
      if (level === '中等') return 'level-medium';
      if (level === '易错') return 'level-hard';
      return '';
    }

    // ---------- 渲染 ----------

      app.classList.toggle('app--practice', currentView === 'practice');
      if (currentView === 'home') renderHome();
      else if (currentView === 'practice') renderPractice();
      else if (currentView === 'remedial') renderRemedial();
      else if (currentView === 'complete') renderComplete();
    }

                <input type="text" class="student-input" id="studentNameInput" placeholder="姓名" autocomplete="off">

        }

        return `
          <div class="history-step">
            <div class="history-step-num">第 ${item.stepNum} 步：${escapeHtml(text)}</div>
          </div>

    function getKnowledgeTags(q) {
      if (!q || !Array.isArray(q.steps)) return [];
      const tags = q.steps
        .map(step => (step.skillTag || '').trim())
        .filter(Boolean);
      return Array.from(new Set(tags));
    }

    function saveCurrentStepToHistory() {
      const q = questionsData.find(x => x.id === currentQuestionId);
      const step = q.steps[currentStepIndex];
      let answer = '';
      if (step.type === 'choice') {
        answer = step.options[step.correctIndex].text;
      } else {
        const input = document.getElementById('answerInput');
        answer = input ? input.value.trim() : '';
      }
      const historyItem = {
        stepNum: currentStepIndex + 1,
        question: step.question,
        answer: answer,
        skillTag: step.skillTag || '',
        stepSummary: step.stepSummary || ''
      };
      stepHistory.push(historyItem);
    }

              <button class="btn btn-next hidden" id="nextBtn" onclick="goNextStep()">下一步</button>
            </div>
            <button class="btn btn-secondary" onclick="goHome()">返回首页</button>
          </section>
        </div>
      `;

      stepAnswered = false;

      if (step.type === 'input') {
        const input = document.getElementById('answerInput');
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitInput();
        });
      }
    }

    function renderComplete() {
      const q = questionsData.find(x => x.id === currentQuestionId);
      if (!q) { goHome(); return; }

      const now = new Date();
      const timeStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

      markCompleted(currentQuestionId);

      const completed = getCompletedIds();
      const allDone = questionsData.every(item => completed.includes(item.id));

      const hintHtml = allDone
        ? `<p class="complete-hint">今日 ${questionsData.length} 道题已全部完成！<br>请截图本页发给老师。</p>`
        : `<p class="complete-hint">你已经把本题所有关键条件订正到全对。<br>返回首页继续下一题吧。</p>`;

      app.innerHTML = `
        <div class="complete-page">
          <div class="complete-emoji">🎉</div>
          <h2>${allDone ? '全部完成！' : '恭喜完成！'}</h2>
          <div class="complete-info">
            <div><strong>题目名称：</strong>${escapeHtml(q.title)}</div>
            <div><strong>最终得分：</strong>100%</div>
            <div><strong>完成时间：</strong>${timeStr}</div>
            ${allDone ? `<div><strong>完成进度：</strong>${questionsData.length}/${questionsData.length}</div>` : ''}
          </div>
          ${hintHtml}
          <button class="btn btn-primary" onclick="goHome()">返回首页</button>
        </div>
      `;
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ---------- 交互 ----------
    function saveStudentInfo() {
      const classInput = document.getElementById('studentClassInput');
      const nameInput = document.getElementById('studentNameInput');
      const className = classInput ? classInput.value.trim() : '';
      const name = nameInput ? nameInput.value.trim() : '';
      if (!className || !name) {
        alert('请填写班级和姓名。');
        return;
      }
      setCurrentStudent(className, name);
      renderHome();
    }

    function switchStudent() {
      clearCurrentStudent();
      renderHome();
    }

    function startPractice(id) {
      currentQuestionId = id;
      currentStepIndex = 0;
      stepHistory = [];
      stepErrorCount = 0;
      showingFeedbackCard = false;
      stepErrors = [];
      currentRemedialData = null;
      remedialAnswered = false;
      currentView = 'practice';
      render();
    }

    // 显示反馈卡片
    function showFeedbackCard(message) {
      showingFeedbackCard = true;
      const overlay = document.createElement('div');
      overlay.className = 'feedback-card-overlay';
      overlay.id = 'feedbackCardOverlay';
      overlay.innerHTML = `
        <div class="feedback-card">
          <div class="feedback-card-header">
            <div class="feedback-card-icon">❌</div>
            <div class="feedback-card-title">答错了，请重新思考</div>
          </div>
          <div class="feedback-card-content">${escapeHtml(message)}</div>
          <button class="feedback-card-btn" onclick="closeFeedbackCard()">我已读懂，重新作答</button>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    // 关闭主线反馈卡片
    function closeFeedbackCard() {
      showingFeedbackCard = false;
      const overlay = document.getElementById('feedbackCardOverlay');
      if (overlay) overlay.remove();

      if (currentView !== 'practice') return;
      const q = questionsData.find(x => x.id === currentQuestionId);
      if (!q) return;
      const step = q.steps[currentStepIndex];
      if (!step) return;

      if (step.type === 'choice') {
        document.querySelectorAll('.option-btn').forEach((btn) => {
          btn.disabled = false;
          btn.classList.remove('selected-wrong', 'selected-correct');
        });
      } else if (step.type === 'input') {
        const input = document.getElementById('answerInput');
        if (input) { input.select(); input.focus(); }
      }
    }

    // ---------- 错误记录与微变式选择 ----------
    function recordStepError(step, stepIndex) {
      const existing = stepErrors.find(e => e.stepIndex === stepIndex);
      if (existing) {
        existing.errorCount++;
      } else {
        stepErrors.push({
          stepIndex:            stepIndex,
          skillTag:             step.skillTag || '',
          priority:             (typeof step.priority === 'number') ? step.priority : 0,
          errorCount:           1,
          remedialQuestion:     step.remedialQuestion     || null,
          remedialOptions:      step.remedialOptions      || null,
          remedialCorrectIndex: (step.remedialCorrectIndex != null) ? step.remedialCorrectIndex : null,
          remedialAnswer:       step.remedialAnswer       || null,
          remedialExplanation:  step.remedialExplanation  || null,
          remedialImage:        step.remedialImage        || null
        });
      }
    }

    // 从错误记录中选出最优先的微变式（主线完成后调用）
    function selectRemedialStep() {
      const candidates = stepErrors.filter(e => e.remedialQuestion);
      if (candidates.length === 0) return null;
      candidates.sort((a, b) => {
        if (b.priority !== a.priority) return b.priority - a.priority;
        if (b.errorCount !== a.errorCount) return b.errorCount - a.errorCount;
        return a.stepIndex - b.stepIndex;
      });
      return candidates[0];
    }

    // ---------- 微变式页渲染 ----------
    function renderRemedial() {
      const q = questionsData.find(x => x.id === currentQuestionId);
      const rd = currentRemedialData;
      if (!rd) { currentView = 'complete'; render(); return; }

      const imgSrc = rd.remedialImage || (q ? q.image : null);
      const imageHtml = imgSrc
        ? `<div class="problem-image-wrap"><img class="problem-image" src="${escapeHtml(imgSrc)}" alt="题目原图（点击放大）" onclick="openImageModal(this.src)"></div>`
        : '';

      let answerHtml = '';
      const hasOptions = Array.isArray(rd.remedialOptions) && rd.remedialOptions.length > 0;
      if (hasOptions) {
        answerHtml = `
          <ul class="options-list" id="remedialOptionsList">
            ${rd.remedialOptions.map((opt, i) => `
              <li>
                <button type="button" class="option-btn" onclick="submitRemedialChoice(${i})" id="remedial-opt-${i}">
                  ${escapeHtml(opt)}
                </button>
              </li>
            `).join('')}
          </ul>`;
      } else {
        answerHtml = `
          <div class="input-group">
            <input type="text" class="input-field" id="remedialInput" placeholder="请输入答案" autocomplete="off">
            <button class="btn btn-primary" id="remedialSubmitBtn" onclick="submitRemedialInput()">提交</button>
          </div>`;
      }

      app.innerHTML = `
        <div class="remedial-header">
          <div class="remedial-badge">🔍 针对性补练</div>
          <div class="remedial-skill">考查技能：${escapeHtml(rd.skillTag || '')}</div>
        </div>
        ${imageHtml}
        <div class="step-box">
          <div class="step-question">${escapeHtml(rd.remedialQuestion)}</div>
          ${answerHtml}
          <div class="feedback" id="remedialFeedback"></div>
          <button class="btn btn-finish hidden" id="remedialFinishBtn" onclick="finishRemedial()">完成训练</button>
        </div>
        <button class="btn btn-secondary" onclick="goHome()">返回首页</button>
      `;

      remedialAnswered = false;

      if (!hasOptions) {
        const input = document.getElementById('remedialInput');
        if (input) {
          input.addEventListener('keydown', e => { if (e.key === 'Enter') submitRemedialInput(); });
        }
      }
    }

    // 微变式选择题提交
    function submitRemedialChoice(index) {
      if (remedialAnswered || showingFeedbackCard) return;

      const rd = currentRemedialData;
      const feedbackEl = document.getElementById('remedialFeedback');
      const finishBtn = document.getElementById('remedialFinishBtn');

      document.querySelectorAll('#remedialOptionsList .option-btn').forEach(btn => {
        btn.disabled = true;
      });

      const btn = document.getElementById('remedial-opt-' + index);
      const isCorrect = index === rd.remedialCorrectIndex;

      if (isCorrect) {
        if (btn) btn.classList.add('selected-correct');
        feedbackEl.className = 'feedback show correct';
        feedbackEl.innerHTML = `<div class="feedback-title">✅ 正确</div><div>${escapeHtml(rd.remedialExplanation || '回答正确！')}</div>`;
        remedialAnswered = true;
        logEvent('remedial_correct', {
          answerType: 'choice',
          selectedIndex: index,
          selectedAnswer: Array.isArray(rd.remedialOptions) ? rd.remedialOptions[index] : null,
          remedialQuestion: rd.remedialQuestion,
          skillTag: rd.skillTag || null,
          priority: rd.priority || null,
          sourceStepIndex: rd.stepIndex,
          sourceStepNum: rd.stepIndex != null ? rd.stepIndex + 1 : null
        });
        if (finishBtn) finishBtn.classList.remove('hidden');
      } else {
        if (btn) btn.classList.add('selected-wrong');
        logEvent('remedial_wrong', {
          answerType: 'choice',
          selectedIndex: index,
          selectedAnswer: Array.isArray(rd.remedialOptions) ? rd.remedialOptions[index] : null,
          remedialQuestion: rd.remedialQuestion,
          skillTag: rd.skillTag || null,
          priority: rd.priority || null,
          sourceStepIndex: rd.stepIndex,
          sourceStepNum: rd.stepIndex != null ? rd.stepIndex + 1 : null
        });
        const msg = rd.remedialExplanation
          ? `这道补练题还没有答对，请重新观察图形和题干。\n\n解析：${rd.remedialExplanation}`
          : '这道补练题还没有答对，请重新观察图形和题干。';
        showRemedialFeedbackCard(msg);
      }
    }

    // 微变式填空题提交
    function submitRemedialInput() {
      if (remedialAnswered || showingFeedbackCard) return;

      const rd = currentRemedialData;
      const input = document.getElementById('remedialInput');
      const feedbackEl = document.getElementById('remedialFeedback');
      const finishBtn = document.getElementById('remedialFinishBtn');
      const submitBtn = document.getElementById('remedialSubmitBtn');

      if (!input || !input.value.trim()) {
        showRemedialFeedbackCard('请先输入答案。');
        return;
      }

      const accepted = rd.remedialAnswer ? [rd.remedialAnswer] : [];
      const isCorrect = checkInputAnswer(input.value, accepted);

      if (isCorrect) {
        feedbackEl.className = 'feedback show correct';
        feedbackEl.innerHTML = `<div class="feedback-title">✅ 正确</div><div>${escapeHtml(rd.remedialExplanation || '回答正确！')}</div>`;
        if (input) input.disabled = true;
        if (submitBtn) submitBtn.disabled = true;
        remedialAnswered = true;
        logEvent('remedial_correct', {
          answerType: 'input',
          answer: input.value.trim(),
          remedialQuestion: rd.remedialQuestion,
          skillTag: rd.skillTag || null,
          priority: rd.priority || null,
          sourceStepIndex: rd.stepIndex,
          sourceStepNum: rd.stepIndex != null ? rd.stepIndex + 1 : null
        });
        if (finishBtn) finishBtn.classList.remove('hidden');
      } else {
        logEvent('remedial_wrong', {
          answerType: 'input',
          answer: input.value.trim(),
          remedialQuestion: rd.remedialQuestion,
          skillTag: rd.skillTag || null,
          priority: rd.priority || null,
          sourceStepIndex: rd.stepIndex,
          sourceStepNum: rd.stepIndex != null ? rd.stepIndex + 1 : null
        });
        const msg = rd.remedialExplanation
          ? `这道补练题还没有答对，请重新观察图形和题干。\n\n解析：${rd.remedialExplanation}`
          : '这道补练题还没有答对，请重新观察图形和题干。';
        showRemedialFeedbackCard(msg);
      }
    }

    // 微变式专用反馈卡片（关闭时恢复微变式 UI）
    function showRemedialFeedbackCard(message) {
      showingFeedbackCard = true;
      const overlay = document.createElement('div');
      overlay.className = 'feedback-card-overlay';
      overlay.id = 'feedbackCardOverlay';
      overlay.innerHTML = `
        <div class="feedback-card">
          <div class="feedback-card-header">
            <div class="feedback-card-icon">❌</div>
            <div class="feedback-card-title">答错了，请重新思考</div>
          </div>
          <div class="feedback-card-content">${escapeHtml(message)}</div>
          <button class="feedback-card-btn" onclick="closeRemedialFeedbackCard()">我已读懂，重新作答</button>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function closeRemedialFeedbackCard() {
      showingFeedbackCard = false;
      const overlay = document.getElementById('feedbackCardOverlay');
      if (overlay) overlay.remove();

      const rd = currentRemedialData;
      if (!rd) return;
      const hasOptions = Array.isArray(rd.remedialOptions) && rd.remedialOptions.length > 0;
      if (hasOptions) {
        document.querySelectorAll('#remedialOptionsList .option-btn').forEach(btn => {
          btn.disabled = false;
          btn.classList.remove('selected-wrong', 'selected-correct');
        });
      } else {
        const input = document.getElementById('remedialInput');
        if (input) { input.select(); input.focus(); }
      }
    }

    // 微变式完成，跳到最终完成页
    function finishRemedial() {
      const q = questionsData.find(x => x.id === currentQuestionId);
      currentRemedialData = null;
      logEvent('question_complete', {
        questionTitle: q ? q.title : null,
        questionId: currentQuestionId,
        hasRemedial: true,
        completedAt: new Date().toISOString()
      });
      currentView = 'complete';
      render();
    }

    function selectOption(index) {
      if (stepAnswered || showingFeedbackCard) return;

      const q = questionsData.find(x => x.id === currentQuestionId);
      const step = q.steps[currentStepIndex];
      const opt = step.options[index];
      const feedbackEl = document.getElementById('feedback');
      const nextBtn = document.getElementById('nextBtn');

      // 禁用所有选项
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.disabled = true;
      });

      const btn = document.getElementById('opt-' + index);
      const isCorrect = index === step.correctIndex;

      if (isCorrect) {
        btn.classList.add('selected-correct');
        feedbackEl.className = 'feedback show correct';
        feedbackEl.innerHTML = `<div class="feedback-title">✅ 正确</div><div>${escapeHtml(opt.feedback)}</div>`;
        stepAnswered = true;
        logEvent('step_correct', {
          answerType: 'choice',
          selectedIndex: index,
          selectedAnswer: opt.text
        });
        stepErrorCount = 0; // 重置错误计数
        nextBtn.classList.remove('hidden');
      } else {
        btn.classList.add('selected-wrong');
        
        // 获取提示内容
        let feedbackMessage = opt.feedback;
        
        // 如果有hints数组，根据错误次数显示不同提示
        if (step.hints && Array.isArray(step.hints) && step.hints.length > 0) {
          const hintIndex = Math.min(stepErrorCount, step.hints.length - 1);
          feedbackMessage = step.hints[hintIndex];
        }
        
        recordStepError(step, currentStepIndex); // 记录该步骤出错
        stepErrorCount++; // 增加错误计数
        logEvent('step_wrong', {
          answerType: 'choice',
          selectedIndex: index,
          selectedAnswer: opt.text,
          errorCount: stepErrorCount
        });
        
        // 显示反馈卡片
        showFeedbackCard(feedbackMessage);
      }
    }

    function submitInput() {
      if (stepAnswered || showingFeedbackCard) return;

      const q = questionsData.find(x => x.id === currentQuestionId);
      const step = q.steps[currentStepIndex];
      const input = document.getElementById('answerInput');
      const val = input.value;
      const feedbackEl = document.getElementById('feedback');
      const nextBtn = document.getElementById('nextBtn');
      const submitBtn = document.getElementById('submitBtn');

      if (!val.trim()) {
        showFeedbackCard('请先输入答案。');
        return;
      }

      const isCorrect = checkInputAnswer(val, step.acceptedAnswers);

      if (isCorrect) {
        feedbackEl.className = 'feedback show correct';
        feedbackEl.innerHTML = `<div class="feedback-title">✅ 正确</div><div>${escapeHtml(step.feedbackCorrect)}</div>`;
        input.disabled = true;
        submitBtn.disabled = true;
        stepAnswered = true;
        logEvent('step_correct', {
          answerType: 'input',
          answer: val.trim()
        });
        stepErrorCount = 0; // 重置错误计数
        nextBtn.classList.remove('hidden');
      } else {
        // 获取提示内容
        let feedbackMessage = step.feedbackWrong;
        
        // 如果有hints数组，根据错误次数显示不同提示
        if (step.hints && Array.isArray(step.hints) && step.hints.length > 0) {
          const hintIndex = Math.min(stepErrorCount, step.hints.length - 1);
          feedbackMessage = step.hints[hintIndex];
        }
        
        recordStepError(step, currentStepIndex); // 记录该步骤出错
        stepErrorCount++; // 增加错误计数
        logEvent('step_wrong', {
          answerType: 'input',
          answer: val.trim(),
          errorCount: stepErrorCount
        });
        
        // 显示反馈卡片
        showFeedbackCard(feedbackMessage);
      }
    }

    function goNextStep() {
      const q = questionsData.find(x => x.id === currentQuestionId);
      saveCurrentStepToHistory();
      currentStepIndex++;
      stepErrorCount = 0; // 重置新步骤的错误计数
      stepAnswered = false; // 重置答题状态
      if (currentStepIndex >= q.steps.length) {
        // 主线全部完成，检查是否需要推送微变式
        const remedialData = selectRemedialStep();
        if (remedialData) {
          currentRemedialData = remedialData;
          remedialAnswered = false;
          logEvent('remedial_start', {
            remedialQuestion: remedialData.remedialQuestion,
            sourceStepIndex: remedialData.stepIndex,
            sourceStepNum: remedialData.stepIndex != null ? remedialData.stepIndex + 1 : null,
            sourceSkillTag: remedialData.skillTag || null,
            sourcePriority: remedialData.priority || null
          });
          currentView = 'remedial';
        } else {
          logEvent('question_complete', {
            questionTitle: q ? q.title : null,
            questionId: currentQuestionId,
            hasRemedial: false,
            completedAt: new Date().toISOString()
          });
          currentView = 'complete';
        }
      }
      render();
    }

    function goHome() {
      currentView = 'home';
      currentQuestionId = null;
      currentStepIndex = 0;
      stepHistory = [];
      stepErrorCount = 0;
      showingFeedbackCard = false;
      stepErrors = [];
      currentRemedialData = null;
      remedialAnswered = false;
      // 清除可能存在的反馈卡片
      const overlay = document.getElementById('feedbackCardOverlay');
      if (overlay) overlay.remove();
      render();
    }

    // ---------- 原题区折叠（手机端） ----------
    function toggleQuestionPanel() {
      const panel = document.getElementById('questionPanel');
      const btn = document.getElementById('questionToggleBtn');
      if (!panel) return;
      const open = panel.classList.toggle('is-open');
      if (btn) btn.textContent = open ? '收起题干文字' : '查看题干文字';
    }

    function toggleKnowledgeCard() {
      const card = document.getElementById('knowledgeCard');
      const toggle = document.getElementById('knowledgeCardToggle');
      if (!card) return;
      const open = card.classList.toggle('is-open');
      if (toggle) toggle.textContent = open ? '收起' : '展开';
    }

    function showKnowledgeExplanation(skillTag) {
      const explanation = document.getElementById('knowledgeExplanation');
      if (!explanation) return;
      explanation.textContent = knowledgeBase[skillTag] || DEFAULT_KNOWLEDGE_EXPLANATION;

      document.querySelectorAll('.knowledge-tag').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.skill === skillTag);
      });
    }

    // ---------- 题图点击放大 ----------
    function openImageModal(src) {
      const modal = document.getElementById('imageModal');
      const img = document.getElementById('imageModalImg');
      if (!modal || !img) return;
      img.src = src;
      modal.classList.add('show');
    }

    function closeImageModal() {
      const modal = document.getElementById('imageModal');
      if (modal) modal.classList.remove('show');
    }

    (function setupImageModal() {
      const modal = document.getElementById('imageModal');
      const img = document.getElementById('imageModalImg');
      const closeBtn = document.getElementById('imageModalClose');
      // 点击遮罩关闭；点击图片本身不关闭
      if (modal) modal.addEventListener('click', closeImageModal);
      if (img) img.addEventListener('click', e => e.stopPropagation());
      if (closeBtn) closeBtn.addEventListener('click', e => { e.stopPropagation(); closeImageModal(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeImageModal(); });
    })();

    // 暴露给 onclick
    window.saveStudentInfo = saveStudentInfo;
    window.switchStudent = switchStudent;
    window.startPractice = startPractice;
    window.toggleQuestionPanel = toggleQuestionPanel;
    window.toggleKnowledgeCard = toggleKnowledgeCard;
    window.showKnowledgeExplanation = showKnowledgeExplanation;
    window.openImageModal = openImageModal;
    window.closeImageModal = closeImageModal;
    window.selectOption = selectOption;
    window.submitInput = submitInput;
    window.goNextStep = goNextStep;
    window.goHome = goHome;
    window.closeFeedbackCard = closeFeedbackCard;
    window.submitRemedialChoice = submitRemedialChoice;
    window.submitRemedialInput = submitRemedialInput;
    window.closeRemedialFeedbackCard = closeRemedialFeedbackCard;
    window.finishRemedial = finishRemedial;

    // 调试：事件记录相关函数
    window.logEvent = logEvent;
    window.getEventLogs = getEventLogs;
    window.clearEventLogs = clearEventLogs;
    window.exportEventLogsCsv = exportEventLogsCsv;
    window.exportTeacherFriendlyCsv = exportTeacherFriendlyCsv;

    // 启动
    render();
    if (!isPreviewMode()) {
      flushPendingEvents();
    }
  </script>
</body>
</html>
