<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>数学读题小助手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --success-bg: #dcfce7;
      --error: #dc2626;
      --error-bg: #fee2e2;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 17px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 32px;
    }

    /* ========== 首页 ========== */
    .home-header {
      text-align: center;
      padding: 24px 0 16px;
    }

    .home-header h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .home-desc {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      padding: 0 8px;
      margin-bottom: 20px;
    }

    .all-done-banner {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #fff;
      text-align: center;
      padding: 16px;
      border-radius: var(--radius);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .question-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-block;
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 20px;
      background: #eff6ff;
      color: var(--primary);
    }

    .tag.level-basic { background: #f0fdf4; color: #16a34a; }
    .tag.level-medium { background: #fff7ed; color: #ea580c; }
    .tag.level-hard { background: #fef2f2; color: #dc2626; }

    .status {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .status.done { color: var(--success); font-weight: 600; }

    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      font-size: 17px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: #f1f5f9;
      color: var(--text);
      margin-top: 10px;
    }

    .btn-next {
      margin-top: 16px;
      background: var(--success);
      color: #fff;
    }

    .btn-next:hover { background: #15803d; }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ========== 练习页 ========== */
    .practice-header {
      margin-bottom: 16px;
    }

    .practice-header h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .progress-bar {
      font-size: 15px;
      color: var(--primary);
      font-weight: 600;
    }

    .problem-image-wrap {
      margin-bottom: 16px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: #fff;
      box-shadow: var(--shadow);
    }

    .problem-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .problem-box {
      background: #fffbeb;
      border: 2px solid #fde68a;
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
      font-size: 18px;
      line-height: 1.8;
      font-weight: 500;
    }

    .step-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .step-question {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 16px;
      line-height: 1.7;
    }

    .history-section {
      margin-bottom: 16px;
    }

    .history-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .history-step {
      background: var(--success-bg);
      border: 1px solid #86efac;
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .history-step-num {
      font-size: 13px;
      font-weight: 600;
      color: var(--success);
      margin-bottom: 4px;
    }

    .history-question {
      font-size: 15px;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .history-answer {
      font-size: 16px;
      font-weight: 600;
      color: #166534;
      line-height: 1.5;
    }

    .current-step-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .options-list { list-style: none; }

    .option-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      margin-bottom: 10px;
      font-size: 16px;
      background: #f8fafc;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      line-height: 1.5;
      transition: border-color 0.15s, background 0.15s;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .option-btn:disabled { cursor: default; }

    .option-btn.selected-wrong {
      border-color: var(--error);
      background: var(--error-bg);
    }

    .option-btn.selected-correct {
      border-color: var(--success);
      background: var(--success-bg);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      font-size: 17px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      outline: none;
    }

    .input-field:focus { border-color: var(--primary); }

    .feedback {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: var(--radius);
      font-size: 16px;
      line-height: 1.6;
      display: none;
    }

    .feedback.show { display: block; }

    .feedback.correct {
      background: var(--success-bg);
      color: #166534;
      border: 1px solid #86efac;
    }

    .feedback.wrong {
      background: var(--error-bg);
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .feedback-title {
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 6px;
    }

    /* ========== 完成页 ========== */
    .complete-page {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      box-shadow: var(--shadow);
      border: 2px solid #86efac;
    }

    .complete-emoji {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .complete-page h2 {
      font-size: 24px;
      color: var(--success);
      margin-bottom: 20px;
    }

    .complete-info {
      text-align: left;
      background: #f0fdf4;
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 20px;
      font-size: 16px;
      line-height: 2;
    }

    .complete-info strong { color: var(--text); }

    .complete-hint {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- 内容由 JS 渲染 -->
  </div>

  <script src="questions.js"></script>
  <script>
    const STORAGE_KEY = 'math_reading_completed';

    // ---------- 路由状态 ----------
    let currentView = 'home'; // home | practice | complete
    let currentQuestionId = null;
    let currentStepIndex = 0;
    let stepAnswered = false;
    let stepHistory = []; // 已完成步骤：{ stepNum, question, answer }

    const app = document.getElementById('app');

    // ---------- localStorage ----------
    function getCompletedIds() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function markCompleted(id) {
      const ids = getCompletedIds();
      if (!ids.includes(id)) {
        ids.push(id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
      }
    }

    function isCompleted(id) {
      return getCompletedIds().includes(id);
    }

    // ---------- 答案标准化 ----------
    function normalizeAnswer(str) {
      if (typeof str !== 'string') return '';
      let s = str.trim();
      // 去掉所有空格（含全角）
      s = s.replace(/[\s\u3000]/g, '');
      // 中文符号转英文
      const map = {
        '＋': '+', '－': '-', '×': '*', '÷': '/',
        '＝': '=', '（': '(', '）': ')',
        '°': '°', '度': '度',
        'ｘ': 'x', 'Ｘ': 'x', 'χ': 'x'
      };
      for (const [cn, en] of Object.entries(map)) {
        s = s.split(cn).join(en);
      }
      return s.toLowerCase();
    }

    function checkInputAnswer(input, acceptedAnswers) {
      const normalized = normalizeAnswer(input);
      return acceptedAnswers.some(a => normalizeAnswer(a) === normalized);
    }

    // ---------- 难度样式 ----------
    function levelClass(level) {
      if (level === '基础') return 'level-basic';
      if (level === '中等') return 'level-medium';
      if (level === '易错') return 'level-hard';
      return '';
    }

    // ---------- 渲染 ----------
    function render() {
      if (currentView === 'home') renderHome();
      else if (currentView === 'practice') renderPractice();
      else if (currentView === 'complete') renderComplete();
    }

    function renderHome() {
      const completed = getCompletedIds();
      const total = questionsData.length;
      const doneCount = questionsData.filter(q => completed.includes(q.id)).length;
      const allDone = doneCount === total;

      let html = `
        <div class="home-header">
          <h1>数学读题小助手</h1>
          <p class="home-desc">请认真读题，完成每一步条件提取训练。5 道题全部完成后，截图发给老师。</p>
        </div>
      `;

      if (allDone) {
        html += `<div class="all-done-banner">今日训练已全部完成：${doneCount}/${total}<br>请截图本页发给老师</div>`;
      }

      questionsData.forEach(q => {
        const done = isCompleted(q.id);
        html += `
          <div class="question-card">
            <div class="card-title">${escapeHtml(q.title)}</div>
            <div class="card-meta">
              <span class="tag">${escapeHtml(q.tag)}</span>
              <span class="tag ${levelClass(q.level)}">${escapeHtml(q.level)}</span>
            </div>
            <div class="status ${done ? 'done' : ''}">${done ? '✅ 已完成' : '未完成'}</div>
            <button class="btn btn-primary" onclick="startPractice('${q.id}')">${done ? '再练一次' : '开始训练'}</button>
          </div>
        `;
      });

      app.innerHTML = html;
    }

    function renderHistoryHtml() {
      if (stepHistory.length === 0) return '';
      const items = stepHistory.map(item => `
        <div class="history-step">
          <div class="history-step-num">第 ${item.stepNum} 步 · 已完成</div>
          <div class="history-question">${escapeHtml(item.question)}</div>
          <div class="history-answer">✅ ${escapeHtml(item.answer)}</div>
        </div>
      `).join('');
      return `
        <div class="history-section">
          <div class="history-title">前面已完成的步骤</div>
          ${items}
        </div>
      `;
    }

    function saveCurrentStepToHistory() {
      const q = questionsData.find(x => x.id === currentQuestionId);
      const step = q.steps[currentStepIndex];
      let answer = '';
      if (step.type === 'choice') {
        answer = step.options[step.correctIndex].text;
      } else {
        const input = document.getElementById('answerInput');
        answer = input ? input.value.trim() : '';
      }
      stepHistory.push({
        stepNum: currentStepIndex + 1,
        question: step.question,
        answer: answer
      });
    }

    function renderPractice() {
      const q = questionsData.find(x => x.id === currentQuestionId);
      if (!q) { goHome(); return; }

      const step = q.steps[currentStepIndex];
      const totalSteps = q.steps.length;

      let stepHtml = '';

      if (step.type === 'choice') {
        stepHtml = `
          <ul class="options-list" id="optionsList">
            ${step.options.map((opt, i) => `
              <li>
                <button type="button" class="option-btn" data-index="${i}" onclick="selectOption(${i})" id="opt-${i}">
                  ${escapeHtml(opt.text)}
                </button>
              </li>
            `).join('')}
          </ul>
        `;
      } else if (step.type === 'input') {
        stepHtml = `
          <div class="input-group">
            <input type="text" class="input-field" id="answerInput" placeholder="${escapeHtml(step.placeholder || '请输入答案')}" autocomplete="off">
            <button class="btn btn-primary" id="submitBtn" onclick="submitInput()">提交</button>
          </div>
        `;
      }

      const imageHtml = q.image
        ? `<div class="problem-image-wrap"><img class="problem-image" src="${escapeHtml(q.image)}" alt="题目原图"></div>`
        : '';

      app.innerHTML = `
        <div class="practice-header">
          <h2>${escapeHtml(q.title)}</h2>
        </div>
        ${imageHtml}
        <div class="problem-box">${escapeHtml(q.problem)}</div>
        ${renderHistoryHtml()}
        <div class="step-box">
          <div class="current-step-label">当前步骤 · 第 ${currentStepIndex + 1} / ${totalSteps} 步</div>
          <div class="step-question">${escapeHtml(step.question)}</div>
          ${stepHtml}
          <div class="feedback" id="feedback"></div>
          <button class="btn btn-next hidden" id="nextBtn" onclick="goNextStep()">下一步</button>
        </div>
        <button class="btn btn-secondary" onclick="goHome()">返回首页</button>
      `;

      stepAnswered = false;

      if (step.type === 'input') {
        const input = document.getElementById('answerInput');
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitInput();
        });
      }
    }

    function renderComplete() {
      const q = questionsData.find(x => x.id === currentQuestionId);
      if (!q) { goHome(); return; }

      const now = new Date();
      const timeStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

      markCompleted(currentQuestionId);

      const completed = getCompletedIds();
      const allDone = questionsData.every(item => completed.includes(item.id));

      const hintHtml = allDone
        ? `<p class="complete-hint">今日 ${questionsData.length} 道题已全部完成！<br>请截图本页发给老师。</p>`
        : `<p class="complete-hint">你已经把本题所有关键条件订正到全对。<br>返回首页继续下一题吧。</p>`;

      app.innerHTML = `
        <div class="complete-page">
          <div class="complete-emoji">🎉</div>
          <h2>${allDone ? '全部完成！' : '恭喜完成！'}</h2>
          <div class="complete-info">
            <div><strong>题目名称：</strong>${escapeHtml(q.title)}</div>
            <div><strong>最终得分：</strong>100%</div>
            <div><strong>完成时间：</strong>${timeStr}</div>
            ${allDone ? `<div><strong>完成进度：</strong>${questionsData.length}/${questionsData.length}</div>` : ''}
          </div>
          ${hintHtml}
          <button class="btn btn-primary" onclick="goHome()">返回首页</button>
        </div>
      `;
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ---------- 交互 ----------
    function startPractice(id) {
      currentQuestionId = id;
      currentStepIndex = 0;
      stepHistory = [];
      currentView = 'practice';
      render();
    }

    function selectOption(index) {
      if (stepAnswered) return;

      const q = questionsData.find(x => x.id === currentQuestionId);
      const step = q.steps[currentStepIndex];
      const opt = step.options[index];
      const feedbackEl = document.getElementById('feedback');
      const nextBtn = document.getElementById('nextBtn');

      // 禁用所有选项
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.disabled = true;
      });

      const btn = document.getElementById('opt-' + index);
      const isCorrect = index === step.correctIndex;

      if (isCorrect) {
        btn.classList.add('selected-correct');
        feedbackEl.className = 'feedback show correct';
        feedbackEl.innerHTML = `<div class="feedback-title">✅ 正确</div><div>${escapeHtml(opt.feedback)}</div>`;
        stepAnswered = true;
        nextBtn.classList.remove('hidden');
      } else {
        btn.classList.add('selected-wrong');
        feedbackEl.className = 'feedback show wrong';
        feedbackEl.innerHTML = `<div class="feedback-title">❌ 再想想</div><div>${escapeHtml(opt.feedback)}</div>`;
        // 选错后允许重新选择：延迟后恢复
        setTimeout(() => {
          document.querySelectorAll('.option-btn').forEach((b, i) => {
            b.disabled = false;
            b.classList.remove('selected-wrong', 'selected-correct');
          });
          feedbackEl.className = 'feedback';
          feedbackEl.innerHTML = '';
        }, 1200);
      }
    }

    function submitInput() {
      if (stepAnswered) return;

      const q = questionsData.find(x => x.id === currentQuestionId);
      const step = q.steps[currentStepIndex];
      const input = document.getElementById('answerInput');
      const val = input.value;
      const feedbackEl = document.getElementById('feedback');
      const nextBtn = document.getElementById('nextBtn');
      const submitBtn = document.getElementById('submitBtn');

      if (!val.trim()) {
        feedbackEl.className = 'feedback show wrong';
        feedbackEl.innerHTML = `<div class="feedback-title">❌ 再想想</div><div>请先输入答案。</div>`;
        return;
      }

      const isCorrect = checkInputAnswer(val, step.acceptedAnswers);

      if (isCorrect) {
        feedbackEl.className = 'feedback show correct';
        feedbackEl.innerHTML = `<div class="feedback-title">✅ 正确</div><div>${escapeHtml(step.feedbackCorrect)}</div>`;
        input.disabled = true;
        submitBtn.disabled = true;
        stepAnswered = true;
        nextBtn.classList.remove('hidden');
      } else {
        feedbackEl.className = 'feedback show wrong';
        feedbackEl.innerHTML = `<div class="feedback-title">❌ 再想想</div><div>${escapeHtml(step.feedbackWrong)}</div>`;
        input.select();
      }
    }

    function goNextStep() {
      const q = questionsData.find(x => x.id === currentQuestionId);
      saveCurrentStepToHistory();
      currentStepIndex++;
      if (currentStepIndex >= q.steps.length) {
        currentView = 'complete';
      }
      render();
    }

    function goHome() {
      currentView = 'home';
      currentQuestionId = null;
      currentStepIndex = 0;
      stepHistory = [];
      render();
    }

    // 暴露给 onclick
    window.startPractice = startPractice;
    window.selectOption = selectOption;
    window.submitInput = submitInput;
    window.goNextStep = goNextStep;
    window.goHome = goHome;

    // 启动
    render();
  </script>
</body>
</html>
